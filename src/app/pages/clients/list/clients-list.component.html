<div class="clients-page flex flex-col gap-6">
  <div>
    <h1 class="page-title">Gestión de Clientes</h1>
  </div>

  <p-card>
    <div class="filters-layout filters-content">
      <form [formGroup]="filtersForm" class="filters-grid">
        <div class="flex flex-col gap-2">
          <label for="name" class="font-semibold">Nombre</label>
          <input id="name" type="text" pInputText formControlName="name" placeholder="Buscar por nombre" />
        </div>

        <div class="flex flex-col gap-2">
          <label for="taxId" class="font-semibold">NIT</label>
          <input id="taxId" type="text" pInputText formControlName="taxId" placeholder="Buscar por NIT" />
        </div>

        <div class="flex flex-col gap-2">
          <label for="contactPhone" class="font-semibold">Teléfono</label>
          <input
            id="contactPhone"
            type="text"
            pInputText
            formControlName="contactPhone"
            placeholder="Buscar por teléfono"
            inputmode="numeric"
            maxlength="20"
            (input)="onPhoneInput($event)"
          />
        </div>

        <div class="flex flex-col gap-2">
          <label for="isActive" class="font-semibold">Estado</label>
          <p-select
            inputId="isActive"
            formControlName="isActive"
            [options]="statusOptions"
            optionLabel="label"
            optionValue="value"
            placeholder="Seleccionar"
          />
        </div>
      </form>

      <div class="filter-actions">
        <button type="button" pButton label="Buscar" icon="pi pi-search" styleClass="flat-button" (click)="onSearch()"></button>
        <button type="button" pButton label="Limpiar" severity="secondary" icon="pi pi-eraser" styleClass="flat-button" (click)="onClear()"></button>
      </div>
    </div>
  </p-card>

  <p-card>
    <div class="list-header">
      <button type="button" pButton label="Nuevo" icon="pi pi-plus" styleClass="flat-button" (click)="onCreate()"></button>
    </div>

    <p-table
      class="mt-4"
      [value]="clients()"
      [lazy]="true"
      [paginator]="true"
      [rows]="pageSize()"
      [first]="first()"
      [totalRecords]="totalItems()"
      [rowsPerPageOptions]="pageSizeOptions"
      [loading]="isLoading()"
      responsiveLayout="scroll"
      currentPageReportTemplate="Mostrando {first} a {last} de {totalRecords} clientes"
      [showCurrentPageReport]="true"
      (onLazyLoad)="onPageChange($event)"
    >
      <ng-template #header>
        <tr>
          <th>Nro. Cliente</th>
          <th>Empresa</th>
          <th>Contacto</th>
          <th>Teléfono</th>
          <th>NIT</th>
          <th>Estado</th>
          <th>Fecha alta</th>
          <th class="text-center">Acciones</th>
        </tr>
      </ng-template>

      <ng-template #body let-client>
        <tr>
          <td>{{ client.clientNumber }}</td>
          <td>{{ client.companyName }}</td>
          <td>{{ client.contactName }}</td>
          <td>{{ client.contactPhone || '-' }}</td>
          <td>{{ client.taxId || '-' }}</td>
          <td>
            <p-tag [value]="getStatusLabel(client.isActive)" [severity]="getStatusSeverity(client.isActive)" />
          </td>
          <td>{{ client.createdUtc | date: 'dd/MM/yyyy' }}</td>
          <td class="text-center">
            <button
              type="button"
            pButton
            icon="pi pi-pencil"
            text
            rounded
            styleClass="flat-button"
            ariaLabel="Editar cliente"
            (click)="onEdit(client)"
          ></button>
          </td>
        </tr>
      </ng-template>

      <ng-template #emptymessage>
        <tr>
          <td colspan="8" class="py-6 text-center text-surface-500">No se encontraron clientes.</td>
        </tr>
      </ng-template>
    </p-table>
  </p-card>
</div>
