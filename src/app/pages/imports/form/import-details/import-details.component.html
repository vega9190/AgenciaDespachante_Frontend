<p-card class="order-form-card">
  <div class="form-grid" [formGroup]="importForm">
    <div class="flex flex-col gap-2">
      <label id="clientLabel" class="font-semibold">Cliente</label>
      <p-autocomplete
        inputId="client"
        ariaLabelledBy="clientLabel"
        formControlName="client"
        [suggestions]="clientSuggestions()"
        optionLabel="name"
        [dropdown]="true"
        [forceSelection]="true"
        placeholder="Buscar cliente"
        (completeMethod)="onClientSearch($event)"
        (onDropdownClick)="onClientDropdownClick()"
      />
      @if (getFieldError('client')) {
        <small class="field-error">{{ getFieldError('client') }}</small>
      }
    </div>

    @if (importId()) {
      <div class="flex flex-col gap-2">
        <label id="driverLabel" class="font-semibold">Chofer</label>
        <p-autocomplete
          inputId="driver"
          ariaLabelledBy="driverLabel"
          formControlName="driver"
          [suggestions]="driverSuggestions()"
          optionLabel="fullName"
          [dropdown]="true"
          [forceSelection]="true"
          placeholder="Buscar chofer"
          (completeMethod)="onDriverSearch($event)"
          (onDropdownClick)="onDriverDropdownClick()"
        />
      </div>
    }

    <div class="flex flex-col gap-2">
      <label for="containerNumber" class="font-semibold">Nro. Contenedor</label>
      <input id="containerNumber" type="text" pInputText formControlName="containerNumber" maxlength="50" />
      @if (getFieldError('containerNumber')) {
        <small class="field-error">{{ getFieldError('containerNumber') }}</small>
      }
    </div>    

    <div class="flex flex-col gap-2">
      <label id="containerTypeLabel" class="font-semibold">Tipo Contenedor</label>
      <p-select
        inputId="containerType"
        ariaLabelledBy="containerTypeLabel"
        formControlName="containerType"
        [options]="containerTypeOptions()"
        optionLabel="label"
        optionValue="value"
        placeholder="Seleccionar"
      />
      @if (getFieldError('containerType')) {
        <small class="field-error">{{ getFieldError('containerType') }}</small>
      }
    </div>
  </div>

  @if (isLoadingImport()) {
    <div class="form-loading">Cargando importación...</div>
  }

  <div class="form-actions">
    <button type="button" pButton label="Volver" severity="secondary" styleClass="flat-button" (click)="onCancel()"></button>
    <button
      type="button"
      pButton
      label="Guardar"
      icon="pi pi-save"
      styleClass="flat-button"
      [disabled]="isLoadingImport() || isSaving() || isReadOnly()"
      (click)="onSubmit()"
    ></button>
  </div>
</p-card>
