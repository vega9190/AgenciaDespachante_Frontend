<form [formGroup]="loginForm" (ngSubmit)="onLoginSubmit()">
  <div class="bg-surface-50 dark:bg-surface-950 flex h-screen w-screen items-center justify-center" [ngClass]="{ 'p-input-filled': isFilledInput() }">
    <div class="bg-surface-0 dark:bg-surface-900 seed-login-card">
      <div class="mb-1 flex flex-col items-center gap-1 text-center">
        <img [src]="tenantIdentityStore.logoUrl()" [alt]="tenantIdentityStore.name() + ' logo'" class="h-16 w-16 rounded-2xl shadow-sm" />
        <span class="text-2xl font-bold">{{ tenantIdentityStore.name() }}</span>
      </div>

      <p-inputgroup>
        <p-inputgroup-addon>
          <i class="pi pi-user"></i>
        </p-inputgroup-addon>
        <input pInputText formControlName="user" class="w-full" placeholder="Usuario" autocomplete="username" />
      </p-inputgroup>      

      <p-inputgroup>
        <p-inputgroup-addon>
          <i class="pi pi-key"></i>
        </p-inputgroup-addon>
        <input pInputText type="password" formControlName="password" class="w-full" placeholder="Contrasena" autocomplete="current-password" />
      </p-inputgroup>

      <button pButton type="submit" label="Iniciar sesion" class="my-3 w-full" [disabled]="isSubmitting()"></button>

      @if (shouldShowValidationErrors()) {
        <div class="seed-error-panel">
          @if (loginForm.get('user')?.hasError('required')) {
            <div>El usuario es obligatorio.</div>
          }
          @if (loginForm.get('password')?.hasError('required')) {
            <div>La contraseña es obligatoria.</div>
          }
        </div>
      }

      @if (isUnauthorized()) {
        <div class="seed-error-panel">
          <div>Usuario o contraseña inválidos.</div>
        </div>
      }
    </div>
  </div>
</form>
