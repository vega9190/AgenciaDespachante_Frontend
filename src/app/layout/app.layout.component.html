<div class="layout-container" [class.layout-static]="containerClass['layout-static']" [class.layout-mobile-active]="containerClass['layout-mobile-active']"
  [class.layout-static-inactive]="containerClass['layout-static-inactive']" [class.layout-light]="containerClass['layout-light']"
  [class.layout-primary]="containerClass['layout-primary']">
  <app-topbar />
  <app-sidebar />
  <div class="layout-content-wrapper">
    <div class="layout-content">
      <div class="layout-content-inner">
        <router-outlet />
        <app-footer />
      </div>
    </div>
  </div>

  @if (uiBlockService.isBlocked() > 0) {
    <div class="app-ui-blocker">
      <div class="app-ui-blocker__panel">
        <i class="pi pi-spin pi-spinner"></i>
        <span>Procesando...</span>
      </div>
    </div>
  }
</div>
