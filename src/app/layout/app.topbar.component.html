<div class="layout-topbar">
  <a class="app-logo" routerLink="/dashboard">
    <img src="/assets/tenants/default/logo.svg" alt="Frontend Seed logo" />
    <span>{{ themeConfigService.currentConfig().loginTitle }}</span>
  </a>

  <button class="topbar-menubutton p-link" type="button" (click)="onMenuButtonClick()">
    <span></span>
  </button>

  <div class="topbar-profile">
    <div class="topbar-profile-button">
      <span class="user-avatar">{{ authService.currentUser()?.initials }}</span>
      <span class="profile-details">
        <span class="profile-name">{{ authService.currentUser()?.fullName }}</span>
        <span class="profile-job">{{ authService.currentUser()?.role }}</span>
      </span>
      <button
        pButton
        type="button"
        severity="contrast"
        text
        rounded
        class="topbar-profile-menu-button"
        icon="pi pi-chevron-down"
        aria-label="Open profile menu"
        (click)="profileMenu.toggle($event)"
      ></button>
      <p-menu #profileMenu [model]="profileMenuItems" [popup]="true" appendTo="body"></p-menu>
    </div>
  </div>
</div>
