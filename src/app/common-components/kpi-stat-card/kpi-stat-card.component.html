<div class="border-surface flex items-center gap-4 rounded-border border p-4">
  <div
    class="flex h-12 w-12 shrink-0 items-center justify-center rounded-full text-xl"
    [class.bg-primary-100]="severity() === 'info'"
    [class.text-primary-600]="severity() === 'info'"
    [class.bg-green-100]="severity() === 'success'"
    [class.text-green-600]="severity() === 'success'"
    [class.bg-amber-100]="severity() === 'warn'"
    [class.text-amber-600]="severity() === 'warn'"
    [class.bg-red-100]="severity() === 'danger'"
    [class.text-red-600]="severity() === 'danger'"
  >
    <i [class]="icon()"></i>
  </div>
  <div class="flex flex-col">
    <span class="text-surface-500 text-sm">{{ label() }}</span>
    <span class="text-xl font-semibold">
      @switch (format()) {
        @case ('currency') {
          {{ value() | currency: currencyCode() : 'symbol' : '1.2-2' }}
        }
        @case ('days') {
          {{ value() | number: '1.0-0' }} días
        }
        @default {
          {{ value() | number: '1.0-0' }}
        }
      }
    </span>
  </div>
</div>
